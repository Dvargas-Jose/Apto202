<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facturas — Apartamento</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0b;
    --paper: #f5f1e8;
    --cream: #ede8d8;
    --accent: #c8401a;
    --accent2: #1a5c8f;
    --gold: #b89a4e;
    --muted: #7a7060;
    --line: #cfc9b6;
    --green: #2d6a4f;
    --green-light: #e8f4ed;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0;
  }

  /* ── PANEL DE CONTROL ── */
  .control-panel {
    background: var(--ink);
    color: var(--paper);
    padding: 2rem 3rem;
    position: relative;
    overflow: hidden;
  }

  .control-panel::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    border: 40px solid var(--accent);
    border-radius: 50%;
    opacity: .15;
  }

  .cp-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 2rem;
    margin-bottom: 2rem;
  }

  .cp-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    line-height: 1;
    color: var(--paper);
  }
  .cp-title span { color: var(--accent); font-style: italic; }

  .cp-subtitle {
    font-size: .72rem;
    color: var(--muted);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-top: .4rem;
  }

  .cp-badge {
    background: var(--accent);
    color: white;
    padding: .3rem .8rem;
    font-size: .65rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
  }

  /* grid de inputs */
  .cp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.2rem;
  }

  .cp-field {
    display: flex;
    flex-direction: column;
    gap: .35rem;
  }

  .cp-field label {
    font-size: .65rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
  }

  .cp-field input, .cp-field select {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.15);
    color: var(--paper);
    padding: .6rem .8rem;
    font-family: 'DM Mono', monospace;
    font-size: .85rem;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }

  .cp-field input:focus, .cp-field select:focus {
    border-color: var(--accent);
  }

  .cp-field select option { background: #1a1a17; color: var(--paper); }

  .cp-actions {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .btn {
    padding: .75rem 1.8rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: .78rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: .5rem;
  }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #a83216; transform: translateY(-1px); }
  .btn-secondary { background: transparent; color: var(--paper); border: 1px solid rgba(255,255,255,.3); }
  .btn-secondary:hover { border-color: var(--paper); }
  .btn-print { background: var(--green); color: white; }
  .btn-print:hover { background: #1e4d39; }
  .btn-registros { background: #37474f; color: white; text-decoration: none; }
  .btn-registros:hover { background: #263238; transform: translateY(-1px); }

  /* ── FACTURA ── */
  #invoice-area {
    max-width: 820px;
    margin: 3rem auto;
    padding: 0 2rem;
  }

  .invoice {
    background: white;
    box-shadow: 0 4px 60px rgba(0,0,0,.12), 0 1px 4px rgba(0,0,0,.08);
    position: relative;
    overflow: hidden;
  }

  /* Banda lateral */
  .invoice::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: linear-gradient(to bottom, var(--accent), var(--gold));
  }

  /* Marca de agua */
  .invoice::after {
    content: 'RECIBO';
    position: absolute;
    bottom: 60px; right: -20px;
    font-family: 'DM Serif Display', serif;
    font-size: 7rem;
    color: rgba(0,0,0,.03);
    transform: rotate(-30deg);
    pointer-events: none;
    letter-spacing: .2em;
  }

  .inv-head {
    background: var(--ink);
    color: var(--paper);
    padding: 2.5rem 3rem 2rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2rem;
    align-items: start;
  }

  .inv-apt-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    line-height: 1;
  }
  .inv-apt-name em { color: var(--accent); font-style: italic; }

  .inv-apt-sub {
    font-size: .65rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: .4rem;
  }

  .inv-meta {
    text-align: right;
    font-size: .72rem;
  }

  .inv-meta .inv-num {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--accent);
    display: block;
    margin-bottom: .3rem;
  }

  .inv-meta span { color: var(--muted); }

  .inv-body { padding: 2.5rem 3rem; }

  /* Destinatario */
  .inv-recipient {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--line);
  }

  .inv-section-label {
    font-size: .62rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    margin-bottom: .5rem;
  }

  .inv-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--ink);
  }

  .inv-period {
    text-align: right;
  }

  .inv-period .month {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    color: var(--accent2);
  }

  /* Tabla de items */
  .inv-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 2rem;
    font-size: .82rem;
  }

  .inv-table thead tr {
    border-bottom: 2px solid var(--ink);
  }

  .inv-table thead th {
    padding: .5rem 0;
    text-align: left;
    font-family: 'Syne', sans-serif;
    font-size: .62rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .inv-table thead th:last-child { text-align: right; }

  .inv-table tbody tr {
    border-bottom: 1px solid var(--line);
  }

  .inv-table tbody tr:last-child { border-bottom: none; }

  .inv-table tbody td {
    padding: .9rem 0;
    vertical-align: top;
  }

  .inv-table tbody td:last-child {
    text-align: right;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
  }

  .item-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: .85rem;
    color: var(--ink);
    display: block;
  }

  .item-note {
    font-size: .7rem;
    color: var(--muted);
    margin-top: .15rem;
  }

  /* Categorías */
  .cat-row td {
    padding-top: 1.4rem !important;
    padding-bottom: .3rem !important;
    border-bottom: none !important;
  }

  .cat-label {
    font-family: 'Syne', sans-serif;
    font-size: .62rem;
    font-weight: 800;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    gap: .4rem;
  }

  .cat-label::after {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--accent);
    opacity: .4;
  }

  /* Totales */
  .inv-totals {
    margin-left: auto;
    max-width: 300px;
    border-top: 2px solid var(--ink);
    padding-top: 1rem;
  }

  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: .35rem 0;
    font-size: .82rem;
  }

  .total-row.sub { color: var(--muted); font-size: .78rem; }

  .total-row.grand {
    border-top: 1px solid var(--line);
    margin-top: .5rem;
    padding-top: .7rem;
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--ink);
  }

  .total-row.grand .total-amount { color: var(--accent); }

  /* Status badge */
  .inv-status {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--green-light);
    border: 1px solid var(--green);
    padding: 1rem 1.5rem;
    margin-top: 2rem;
    gap: 1rem;
  }

  .status-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: .8rem;
    color: var(--green);
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    margin-right: .4rem;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100%{opacity:1} 50%{opacity:.4}
  }

  .status-date { font-size: .72rem; color: var(--muted); }

  .metodo-badge {
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    padding: .25rem .7rem;
    font-family: 'Syne', sans-serif;
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    border-radius: 2px;
    margin-top: .5rem;
    margin-left: 1.2rem;
  }
  .metodo-pix      { background: #e0f2fe; color: #0369a1; border: 1px solid #7dd3fc; }
  .metodo-dinheiro { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }

  /* Footer factura */
  .inv-footer {
    background: var(--cream);
    padding: 1.2rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--line);
    font-size: .68rem;
    color: var(--muted);
  }

  .inv-footer strong { color: var(--ink); }

  /* ── PRINT ── */
  @media print {
    .control-panel, .cp-actions, #invoice-area > .btn { display: none !important; }
    body { background: white; }
    #invoice-area { margin: 0; padding: 0; max-width: 100%; }
    .invoice { box-shadow: none; }
  }

  /* ── SELECTOR PERSONAS ── */
  .person-tabs {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
    margin-top: 1.5rem;
  }

  .person-tab {
    padding: .5rem 1.2rem;
    background: transparent;
    border: 1px solid rgba(255,255,255,.2);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: .08em;
    cursor: pointer;
    transition: all .15s;
  }

  .person-tab:hover { border-color: rgba(255,255,255,.5); color: var(--paper); }
  .person-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: .85rem;
  }

  .empty-state .big { font-family: 'DM Serif Display', serif; font-size: 3rem; color: var(--line); margin-bottom: 1rem; }
</style>
</head>
<body>

<!-- PANEL DE CONTROL -->
<div class="control-panel">
  <div class="cp-header">
    <div>
      <div class="cp-title">Facturas <span>Digitales</span></div>
      <div class="cp-subtitle">Sistema de recibos — Apartamento</div>
    </div>
    <div class="cp-badge">José D Vargas 2026 ©</div>
  </div>

  <!-- Tabs personas -->
  <div class="inv-section-label" style="color:var(--muted);margin-bottom:.5rem;">Selecciona el morador</div>
  <div class="person-tabs">
    <button class="person-tab" onclick="setPerson('Karina')">Karina</button>
    <button class="person-tab" onclick="setPerson('Bherly')">Bherly</button>
    <button class="person-tab" onclick="setPerson('Fernando')">Fernando</button>
    <button class="person-tab" onclick="setPerson('José')">José</button>
  </div>

  <div class="cp-grid" style="margin-top:1.5rem;">
    <div class="cp-field">
      <label>Mes de referencia</label>
      <select id="mes">
        <option>Março</option><option>Abril</option><option>Maio</option>
        <option>Junho</option><option>Julho</option><option>Agosto</option>
        <option>Setembro</option><option>Outubro</option><option>Novembro</option>
        <option>Dezembro</option>
      </select>
    </div>
    <div class="cp-field">
      <label>Año</label>
      <input type="number" id="ano" value="2026" min="2024" max="2030">
    </div>
    <div class="cp-field">
      <label>Agua (total mes R$)</label>
      <input type="number" id="agua" placeholder="ej. 100.00" step="0.01" value="">
    </div>
    <div class="cp-field">
      <label>Luz (total mes R$)</label>
      <input type="number" id="luz" placeholder="ej. 100.00" step="0.01" value="">
    </div>
   <div class="cp-field">
      <label>Gastos Adicionales (mes)</label>
      <input type="number" id="gastos_cx" placeholder="ej. 45.00" step="0.01" value="">
    </div>
    <div class="cp-field">
      <label>Fecha de pago (del recibo)</label>
      <input type="date" id="fecha_pago">
    </div>
    <div class="cp-field">
      <label>Método de pago</label>
      <select id="metodo_pago">
        <option value="PIX">PIX</option>
        <option value="Dinheiro">Dinheiro</option>
      </select>
    </div>
  </div>

  <div class="cp-actions">
    <button class="btn btn-primary" onclick="generateInvoice()">⚡ Generar Factura</button>
    <button class="btn btn-print" onclick="window.print()">🖨 Imprimir / PDF</button>
    <button class="btn btn-secondary" onclick="clearInvoice()">✕ Limpiar</button>
    <a class="btn btn-registros" href="https://app.box.com/s/0j5thyv49hse92skvyvpyyxfzfpe1qxp" target="_blank">📋 Hoja de Registros</a>
  </div>
</div>

<!-- ÁREA DE FACTURA -->
<div id="invoice-area">
  <div class="empty-state" id="empty-state">
    <div class="big">📄</div>
    Selecciona un morador y genera la factura
  </div>
  <div id="invoice-container" style="display:none;"></div>
</div>

<script>
  const CONFIG = {
    apartamento: "Apartamento 202",
    direccion: "Viçosa, Minas Gerais",
    arriendo_total: 2000,
    bherly_arriendo: 600,
    internet_total: 100,
    caixinha_por_persona: 30,
    moradores: ["Karina", "Bherly", "Fernando", "José"]
  };

  let selectedPerson = null;

  // Arriendo: Bherly paga 600, resto se divide entre 3
  function getArriendoByPerson(name) {
    if (name === 'Bherly') return CONFIG.bherly_arriendo;
    const resto = CONFIG.arriendo_total - CONFIG.bherly_arriendo;
    return resto / 3;
  }

  function setPerson(name) {
    selectedPerson = name;
    document.querySelectorAll('.person-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
  }

  function clearInvoice() {
    document.getElementById('invoice-container').style.display = 'none';
    document.getElementById('empty-state').style.display = 'block';
  }

  function getInvoiceNumber(person, mes, ano) {
    // Formato: 202-AAMMII-XXXXXX
    // AA = año 2 dígitos | MM = mes 2 dígitos | II = iniciales morador
    // XXXXXX = 6 chars aleatorios únicos generados al momento de emisión
    const CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // sin confusables (O/0, I/1)
    const mesIdx = ["Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"].indexOf(mes) + 1;
    const aa = String(ano).slice(-2);
    const mm = String(mesIdx).padStart(2, '0');
    const initials = {'Karina':'KA','Bherly':'BH','Fernando':'FE','José':'JO'}[person] || person.substring(0,2).toUpperCase();
    // 6 chars completamente aleatorios — únicos por emisión, no se repiten
    const arr = new Uint8Array(6);
    crypto.getRandomValues(arr);
    let suffix = '';
    for (const b of arr) suffix += CHARS[b % CHARS.length];
    return '202-' + aa + mm + initials + '-' + suffix;
  }

  function fmt(n) {
    return 'R$ ' + Number(n).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  function today() {
    return new Date().toLocaleDateString('es-CO', {year:'numeric', month:'long', day:'numeric'});
  }

  function generateInvoice() {
    if (!selectedPerson) {
      alert('Por favor selecciona un morador primero.');
      return;
    }

    const mes = document.getElementById('mes').value;
    const ano = document.getElementById('ano').value;
    const agua_total = parseFloat(document.getElementById('agua').value) || 0;
    const luz_total = parseFloat(document.getElementById('luz').value) || 0;
    const gastos_cx = parseFloat(document.getElementById('gastos_cx').value) || 0;
    const metodo_pago = document.getElementById('metodo_pago').value;
    const fecha_pago_raw = document.getElementById('fecha_pago').value;
    const fecha_pago = fecha_pago_raw
      ? new Date(fecha_pago_raw + 'T12:00').toLocaleDateString('es-CO', {year:'numeric', month:'long', day:'numeric'})
      : today();

    const person = selectedPerson;
    const arriendo = getArriendoByPerson(person);
    const internet = CONFIG.internet_total / 4;
    const agua = agua_total / 4;
    const luz = luz_total / 4;
    const caixinha_base = CONFIG.caixinha_por_persona;
    const gasto_cx_por_persona = (person === "Bherly") ? 0 : gastos_cx / 3;
    const total_caixinha = caixinha_base + gasto_cx_por_persona;

    const total_servicios = internet + agua + luz;
    const grand_total = arriendo + total_caixinha + total_servicios;

    const invNum = getInvoiceNumber(person, mes, ano);

    const isBherly = person === 'Bherly';
    const arriendoNote = isBherly ? `Monto fijo acordado` : `Participación mensual`;

    const html = `
    <div class="invoice" id="the-invoice">

      <div class="inv-head">
        <div>
          <div class="inv-apt-name">${CONFIG.apartamento}</div>
          <div class="inv-apt-sub">${CONFIG.direccion} · Recibo de Gastos</div>
        </div>
        <div class="inv-meta">
          <span class="inv-num">#${invNum}</span>
          <span>Emitido: ${today()}</span>
        </div>
      </div>

      <div class="inv-body">

        <div class="inv-recipient">
          <div>
            <div class="inv-section-label">Facturado a</div>
            <div class="inv-name">${person}</div>
            <div style="font-size:.72rem;color:var(--muted);margin-top:.3rem;">Morador · ${CONFIG.apartamento}</div>
          </div>
          <div class="inv-period">
            <div class="inv-section-label">Período</div>
            <div class="month">${mes}</div>
            <div style="font-size:.75rem;color:var(--muted);">${ano}</div>
          </div>
        </div>

        <table class="inv-table">
          <thead>
            <tr>
              <th style="width:55%">Descripción</th>
              <th>Tipo</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody>

            <!-- RENTA -->
            <tr class="cat-row">
              <td colspan="3"><span class="cat-label">🏠 Renta</span></td>
            </tr>
            <tr>
              <td>
                <span class="item-name">Arriendo</span>
                <span class="item-note">${arriendoNote}</span>
              </td>
              <td style="color:var(--muted);font-size:.75rem;">Fijo · día 11</td>
              <td>${fmt(arriendo)}</td>
            </tr>

            <!-- CAIXINHA -->
            <tr class="cat-row">
              <td colspan="3"><span class="cat-label">💰 Caixinha</span></td>
            </tr>
            <tr>
              <td>
                <span class="item-name">Contribución mensual</span>
                <span class="item-note">Fondo común mensual</span>
              </td>
              <td style="color:var(--muted);font-size:.75rem;">Fijo</td>
              <td>${fmt(caixinha_base)}</td>
            </tr>
            ${gastos_cx > 0 ? `
            <tr>
              <td>
                <span class="item-name">Gastos Adicionales (${mes})</span>
                <span class="item-note">Gastos Adicionales (${mes})</span>
              </td>
              <td style="color:var(--muted);font-size:.75rem;">Variable</td>
              <td>${person === "Bherly" ? '<span style="font-style:italic;color:var(--muted);">Exento</span>' : fmt(gasto_cx_por_persona)}</td>
            </tr>` : ''}

            <!-- SERVICIOS -->
            <tr class="cat-row">
              <td colspan="3"><span class="cat-label">⚡ Servicios</span></td>
            </tr>
            <tr>
              <td>
                <span class="item-name">Internet</span>
                <span class="item-note">Servicio mensual · día 13</span>
              </td>
              <td style="color:var(--muted);font-size:.75rem;">Fijo</td>
              <td>${fmt(internet)}</td>
            </tr>
            ${agua_total > 0 ? `
            <tr>
              <td>
                <span class="item-name">Agua</span>
                <span class="item-note">Servicio variable</span>
              </td>
              <td style="color:var(--muted);font-size:.75rem;">Variable</td>
              <td>${fmt(agua)}</td>
            </tr>` : ''}
            ${luz_total > 0 ? `
            <tr>
              <td>
                <span class="item-name">Luz / Electricidad</span>
                <span class="item-note">Servicio variable</span>
              </td>
              <td style="color:var(--muted);font-size:.75rem;">Variable</td>
              <td>${fmt(luz)}</td>
            </tr>` : ''}

          </tbody>
        </table>

        <!-- TOTALES -->
        <div class="inv-totals">
          <div class="total-row sub"><span>Renta</span><span>${fmt(arriendo)}</span></div>
          <div class="total-row sub"><span>Caixinha</span><span>${fmt(total_caixinha)}</span></div>
          <div class="total-row sub"><span>Servicios</span><span>${fmt(total_servicios)}</span></div>
          <div class="total-row grand">
            <span>Total</span>
            <span class="total-amount">${fmt(grand_total)}</span>
          </div>
        </div>

        <!-- STATUS PAGADO -->
        <div class="inv-status">
          <div>
            <span class="status-dot"></span>
            <span class="status-text">✅ Pagado</span>
            <div class="status-date" style="margin-top:.3rem;margin-left:1.2rem;">Fecha de pago confirmada: <strong>${fecha_pago}</strong></div>
            <div class="${metodo_pago === 'PIX' ? 'metodo-badge metodo-pix' : 'metodo-badge metodo-dinheiro'}">
              ${metodo_pago === 'PIX' ? '⚡ PIX' : '💵 Dinheiro'}
            </div>
          </div>
          <div style="text-align:right;">
            <div style="font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--green);">${fmt(grand_total)}</div>
            <div style="font-size:.65rem;color:var(--muted);">monto total</div>
          </div>
        </div>

      </div>

      <div class="inv-footer">
        <div><strong>${CONFIG.apartamento}</strong> · ${CONFIG.direccion}</div>
        <div>Factura #${invNum} · Generado el ${today()}</div>
      </div>
    </div>
    `;

    document.getElementById('empty-state').style.display = 'none';
    const container = document.getElementById('invoice-container');
    container.style.display = 'block';
    container.innerHTML = html;
    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Setear fecha hoy por defecto
  const dp = document.getElementById('fecha_pago');
  dp.value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
